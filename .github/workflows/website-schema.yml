name: "Website config validation"

on:
  workflow_call:

jobs:
  schema:
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v4"

      - name: "Fetch JSON schema"
        run: "wget https://www.doctrine-project.org/schema/website-schema.json -O website-schema.json"

      - name: "Validate JSON schema"
        run: "jsonschema website-schema.json -i .doctrine-project.json"
